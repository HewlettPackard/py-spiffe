[tool.uv.workspace]
members = ["spiffe", "spiffe-tls", "testutils"]

[dependency-groups]
dev = [
  "ruff>=0.13,<0.16",
  "mypy>=1.19,<2",
  "pyright>=1.1.406,<2",
  "pre-commit>=4.5,<5",
]
test = [
  "pytest>=9,<10",
  "pytest-mock>=3.15,<4",
]

[tool.ruff]
line-length = 95
target-version = "py310"
exclude = ["spiffe/src/spiffe/_proto"]

[tool.ruff.format]
quote-style = "preserve"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
# module-import-not-at-top-of-file
ignore = ["E402"]
